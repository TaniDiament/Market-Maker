events {}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;

    # Each role's three replicas share a network alias (trading-state,
    # exchange, exposure-reservation). Using a variable forces nginx to
    # re-resolve via the docker resolver on every request, so newly
    # started replicas get picked up without a reload.

    server {
        listen 18080;
        location / {
            set $upstream "trading-state:8080";
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
        }
    }

    server {
        listen 18081;
        location / {
            set $upstream "exchange:8080";
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
        }
    }

    server {
        listen 18082;
        location / {
            set $upstream "exposure-reservation:8080";
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
        }
    }
}