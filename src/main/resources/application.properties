spring.application.name=marketmaker
server.port=8080
# Default exposure capacity per symbol
exposure.default-capacity=10000

# Database Configuration (we can change details)
spring.datasource.url=jdbc:postgresql://postgres:5432/marketmaker
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Cap each JVM's connection pool. ~17 JVMs share one Postgres in compose;
# Hikari's default max-pool=10 puts the cluster well above any reasonable
# max_connections. 5 gives plenty of headroom for the actual write load.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=0

# JPA / Hibernate Configuration
# Automatically creates/updates the database tables based on your @Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect