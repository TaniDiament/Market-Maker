# Trading State Service Configuration
spring.application.name=trading-state-service
server.port=8080
spring.rsocket.server.port=7000

# Logging
logging.level.edu.yu.marketmaker.state=DEBUG
logging.level.root=INFO

# Health check endpoint
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# High-availability config
ha.zookeeper.connect=${HA_ZOOKEEPER_CONNECT:zookeeper:2181}
ha.service.name=trading-state
ha.advertise.host=${HOSTNAME:localhost}