# External Order Publisher Configuration
# Exposes test-driven HTTP endpoints via ExternalOrderPublisherController;
# no auto-start, drive it from the e2e test.
spring.application.name=external-order-publisher
exchange.base-url=${EXCHANGE_BASE_URL:http://exchange:8080}

server.port=8080

# Logging
logging.level.edu.yu.marketmaker.external=DEBUG
logging.level.root=INFO

# Health check endpoint
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# High-availability config
ha.zookeeper.connect=${HA_ZOOKEEPER_CONNECT:zookeeper:2181}
ha.service.name=external-publisher
ha.advertise.host=${HA_ADVERTISE_HOST:${HOSTNAME:localhost}}
