# Exchange Service Configuration
spring.application.name=exchange-service
server.port=8080

# Logging
logging.level.edu.yu.marketmaker.exchange=DEBUG
logging.level.root=INFO

# Health check endpoint
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# High-availability config
ha.zookeeper.connect=${HA_ZOOKEEPER_CONNECT:zookeeper:2181}
ha.service.name=exchange
ha.advertise.host=${HOSTNAME:localhost}