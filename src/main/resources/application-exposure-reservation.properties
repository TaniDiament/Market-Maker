# Exposure Reservation Service Configuration
spring.application.name=exposure-reservation-service
server.port=8080


# Logging
logging.level.edu.yu.velocitytrading.exposurereservation=DEBUG
logging.level.root=INFO

# Health check endpoint
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# RSocket server (TCP) for MessageMapping routes
spring.rsocket.server.port=7000

# High-availability config
ha.zookeeper.connect=${HA_ZOOKEEPER_CONNECT:zookeeper:2181}
ha.service.name=exposure-reservation
ha.advertise.host=${HA_ADVERTISE_HOST:${HOSTNAME:localhost}}
